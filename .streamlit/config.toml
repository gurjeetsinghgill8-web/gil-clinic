[server]
# ── Railway / Mobile network fixes ──────────────────────────────────────────
# Mobile carriers (Jio, Airtel, Vi etc.) often block or mangle WebSocket
# compression headers. Disabling it fixes "app not loading on mobile data".
enableWebsocketCompression = false

# Disable CORS enforcement — Railway's reverse proxy handles CORS.
# Without this, mobile browsers behind carrier NAT get CORS errors.
enableCORS = false

# Disable XSRF protection — Railway handles security at the proxy level.
enableXsrfProtection = false

# Allow Railway to pass its own PORT env variable
# (Dockerfile CMD already uses $PORT; this makes it doubly explicit)
headless = true

[browser]
# Prevents Streamlit from trying to open a browser on the server
gatherUsageStats = false

[theme]
base = "light"
