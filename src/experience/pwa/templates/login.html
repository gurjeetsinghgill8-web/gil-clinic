<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/experience/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>{{CLINIC_NAME}} — Patient Login</title>
    <!-- html5-qrcode for camera QR scanning -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 32px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 28px;
        }
        .qr-area {
            background: #f5f7ff;
            border: 2px dashed #d0d5f0;
            border-radius: 16px;
            padding: 32px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            min-height: 140px;
        }
        .qr-area:hover { border-color: #667eea; background: #edf0ff; }
        .qr-area svg { width: 80px; height: 80px; }
        .qr-area p { margin-top: 12px; font-size: 13px; color: #667eea; font-weight: 600; }
        #qrReader {
            display: none;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }
        #qrReader video {
            border-radius: 12px;
            width: 100%;
        }
        .qr-close-btn {
            display: none;
            margin-top: 8px;
            padding: 8px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: #ccc;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .phone-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: border-color 0.3s;
        }
        .phone-input:focus { border-color: #667eea; }
        .phone-input::placeholder { letter-spacing: 0; font-size: 14px; color: #bbb; }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 16px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error { color: #e74c3c; font-size: 13px; margin-top: 12px; display: none; }
        .footer { margin-top: 24px; font-size: 12px; color: #aaa; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🏥</div>
        <h1>{{CLINIC_NAME}}</h1>
        <p class="subtitle">{{CLINIC_SPECIALTY}} — Patient Portal</p>

        <!-- QR Scan Area (stub shown when camera not active) -->
        <div class="qr-area" id="qrArea" onclick="startQRScan()">
            <svg viewBox="0 0 100 100" fill="none" stroke="#667eea" stroke-width="4">
                <rect x="10" y="10" width="30" height="30" rx="4"/>
                <rect x="60" y="10" width="30" height="30" rx="4"/>
                <rect x="10" y="60" width="30" height="30" rx="4"/>
                <rect x="60" y="60" width="30" height="30" rx="4"/>
                <line x1="48" y1="40" x2="48" y2="60" stroke-width="2"/>
                <line x1="40" y1="50" x2="56" y2="50" stroke-width="2"/>
            </svg>
            <p>📸 Scan QR from Token Slip</p>
        </div>

        <!-- QR Reader (live camera) -->
        <div id="qrReader"></div>
        <button class="qr-close-btn" id="qrCloseBtn" onclick="stopQRScan()">✕ Cancel Scan</button>

        <div class="divider">or enter phone number</div>

        <!-- Phone Input -->
        <input
            type="tel"
            class="phone-input"
            id="phoneInput"
            placeholder="Enter 10-digit mobile"
            maxlength="10"
            inputmode="numeric"
            pattern="[0-9]*"
            autocomplete="tel"
        />

        <button class="btn" id="loginBtn" onclick="loginWithPhone()">
            🔍 Check Status
        </button>

        <div class="error" id="errorMsg"></div>

        <div class="footer">
            Your information is secure and encrypted.
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('phoneInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const qrArea = document.getElementById('qrArea');
        const qrReader = document.getElementById('qrReader');
        const qrCloseBtn = document.getElementById('qrCloseBtn');

        let html5QrCode = null;
        let isScanning = false;

        // Auto-submit on 10 digits
        phoneInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
            if (this.value.length === 10) {
                loginWithPhone();
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
        }

        async function loginWithPhone() {
            const phone = phoneInput.value.trim();
            if (phone.length !== 10 || !/^\d{10}$/.test(phone)) {
                showError('Please enter a valid 10-digit mobile number');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Checking...';

            try {
                const resp = await fetch('/api/v1/experience/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method: 'phone', phone: phone }),
                });

                const data = await resp.json();

                if (!resp.ok) {
                    showError(data.detail || 'Patient not found. Please register at reception.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '🔍 Check Status';
                    return;
                }

                // Store session and redirect to dashboard
                localStorage.setItem('session_token', data.session_token);
                localStorage.setItem('patient_name', data.patient.name);
                localStorage.setItem('patient_id', data.patient.patient_id);
                window.location.href = '/experience/dashboard';

            } catch (err) {
                showError('Connection error. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = '🔍 Check Status';
            }
        }

        // ─── QR Code Scanning ────────────────────────────────────
        async function startQRScan() {
            if (isScanning) return;

            try {
                // Check if Html5Qrcode is available
                if (typeof Html5Qrcode === 'undefined') {
                    showError('QR scanner library not loaded. Please use phone number.');
                    return;
                }

                // Get cameras
                const cameras = await Html5Qrcode.getCameras();
                if (!cameras || cameras.length === 0) {
                    showError('No camera found. Please use phone number instead.');
                    return;
                }

                // Show reader, hide stub
                qrArea.style.display = 'none';
                qrReader.style.display = 'block';
                qrCloseBtn.style.display = 'inline-block';

                html5QrCode = new Html5Qrcode("qrReader");
                isScanning = true;

                // Use back camera if available
                const cameraId = cameras.length > 1 ? cameras[1].id : cameras[0].id;

                await html5QrCode.start(
                    cameraId,
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 },
                    },
                    onQRDecoded,
                    function(error) {
                        // QR scan progress — silently ignore non-decode frames
                    }
                );
            } catch (err) {
                console.error('QR scan error:', err);
                showError('Could not start camera. Please use phone number.');
                stopQRScan();
            }
        }

        function onQRDecoded(decodedText) {
            // Successfully decoded a QR code
            stopQRScan();
            qrArea.style.display = 'block';

            // Detect if scanned value is a patient_id (e.g., CQ-20260714-001)
            // or an encrypted QR payload (long hex string)
            if (/^[A-Z]{2,4}-\d{8}-\d{3}$/.test(decodedText)) {
                // Looks like a patient ID from a token slip
                loginWithPatientId(decodedText);
            } else {
                // Encrypted QR payload from staff-generated QR
                loginWithQRPayload(decodedText);
            }
        }

        async function loginWithPatientId(patientId) {
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Logging in...';

            try {
                const resp = await fetch('/api/v1/experience/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method: 'patient_id', patient_id: patientId }),
                });

                const data = await resp.json();

                if (!resp.ok) {
                    showError(data.detail || 'Patient not found. Please try again.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '🔍 Check Status';
                    return;
                }

                localStorage.setItem('session_token', data.session_token);
                localStorage.setItem('patient_name', data.patient.name);
                localStorage.setItem('patient_id', data.patient.patient_id);
                window.location.href = '/experience/dashboard';

            } catch (err) {
                showError('Connection error. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = '🔍 Check Status';
            }
        }

        async function loginWithQRPayload(payload) {
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Logging in...';

            try {
                const resp = await fetch('/api/v1/experience/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method: 'qr', qr_payload: payload }),
                });

                const data = await resp.json();

                if (!resp.ok) {
                    showError(data.detail || 'Invalid QR code. Please try again.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '🔍 Check Status';
                    return;
                }

                localStorage.setItem('session_token', data.session_token);
                localStorage.setItem('patient_name', data.patient.name);
                localStorage.setItem('patient_id', data.patient.patient_id);
                window.location.href = '/experience/dashboard';

            } catch (err) {
                showError('Connection error. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = '🔍 Check Status';
            }
        }

        function stopQRScan() {
            if (html5QrCode) {
                try {
                    html5QrCode.stop();
                    html5QrCode.clear();
                } catch (e) {}
                html5QrCode = null;
            }
            isScanning = false;
            qrReader.style.display = 'none';
            qrCloseBtn.style.display = 'none';
            qrArea.style.display = 'block';
        }

        // Check if already logged in
        const token = localStorage.getItem('session_token');
        if (token) {
            fetch('/api/v1/experience/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(r => {
                if (r.ok) window.location.href = '/experience/dashboard';
                else localStorage.removeItem('session_token');
            })
            .catch(() => {});
        }
    </script>
</body>
</html>
